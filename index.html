<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LedgerBook</title>

<style>
body {
font-family: -apple-system;
background:#0d0f14;
color:white;
padding:15px;
}

h2 {margin-bottom:5px;}

.card {
background:#1a1f2b;
padding:15px;
border-radius:12px;
margin:10px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

button {
padding:12px;
margin-top:8px;
width:100%;
border-radius:10px;
border:none;
background:#3b82f6;
color:white;
font-weight:600;
}

input, select {
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
background:#111;
color:white;
}

.tx {
border-bottom:1px solid #333;
padding:10px 0;
}

.green {color:#22c55e;}
.red {color:#ef4444;}

.small {font-size:12px;color:gray;}

img {
max-width:100%;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>LedgerBook</h2>
<p class="small">Developed by Shriganesh Manurkar</p>

<div class="card">
<h3>Add Transaction</h3>

<select id="type">
<option>Expense</option>
<option>Income</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<select id="category">
<option>Grocery & Vegetables</option>
<option>Fuel</option>
<option>Shopping</option>
<option>Salary</option>
<option>Medical</option>
<option>Travel</option>
<option>Entertainment</option>
<option>Clothing</option>
<option>Kids Shopping</option>
<option>Other</option>
</select>

<input type="text" id="note" placeholder="Note">

<input type="file" id="file">

<button onclick="addTx()">Save Transaction</button>
</div>

<div class="card">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<div class="card">
<h3>Backup / Restore</h3>

<button onclick="backup()">Download Backup</button>

<input type="file" id="restoreFile">
<button onclick="restore()">Restore Backup</button>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("ledger") || "[]");

function save(){
localStorage.setItem("ledger", JSON.stringify(db));
}

function format(n){
if(n>=10000000) return (n/10000000).toFixed(1)+"Cr";
if(n>=100000) return (n/100000).toFixed(1)+"L";
if(n>=1000) return (n/1000).toFixed(1)+"K";
return n;
}

function addTx(){
let file = document.getElementById("file").files[0];
let reader = new FileReader();

reader.onload = function(){
let tx = {
type: type.value,
amount: Number(amount.value),
category: category.value,
note: note.value,
file: reader.result || null,
date: new Date().toLocaleDateString()
};

db.unshift(tx);
save();
render();
};

if(file){
reader.readAsDataURL(file);
}else{
reader.onload();
}
}

function render(){
let html="";
let inc=0, exp=0;

db.forEach((t,i)=>{
if(t.type=="Income") inc+=t.amount;
else exp+=t.amount;

html += `
<div class="tx" onclick="view(${i})">
<b>${t.category}</b><br>
₹${format(t.amount)} 
<span class="${t.type=='Income'?'green':'red'}">(${t.type})</span><br>
<span class="small">${t.date}</span>
</div>
`;
});

list.innerHTML = html;

summary.innerText = 
"Income: ₹"+format(inc)+
" | Expense: ₹"+format(exp)+
" | Savings: ₹"+format(inc-exp);
}

function view(i){
let t = db[i];

let w = window.open("");

w.document.write("<h2>"+t.category+"</h2>");
w.document.write("<p><b>Amount:</b> ₹"+t.amount+"</p>");
w.document.write("<p><b>Type:</b> "+t.type+"</p>");
w.document.write("<p><b>Date:</b> "+t.date+"</p>");
w.document.write("<p>"+t.note+"</p>");

if(t.file){
if(t.file.startsWith("data:image")){
w.document.write("<img src='"+t.file+"' style='width:100%'>");
}else{
w.document.write("<a href='"+t.file+"' download>Download File</a>");
}
}
}

function backup(){
let blob = new Blob([JSON.stringify(db)], {type:"application/json"});
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "ledgerbook_backup.json";
a.click();
}

function restore(){
let file = document.getElementById("restoreFile").files[0];
let reader = new FileReader();

reader.onload = function(){
db = JSON.parse(reader.result);
save();
render();
};

reader.readAsText(file);
}

render();
</script>

</body>
</html>
