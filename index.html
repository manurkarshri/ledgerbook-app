<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LedgerBook</title>

<style>
body { font-family: Arial; padding: 15px; background:#f5f5f5; }
h2 { margin-bottom:5px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:12px; }
button { padding:10px; margin:5px 0; width:100%; }
input, select { width:100%; padding:10px; margin:5px 0; }
</style>

</head>

<body>

<h2>LedgerBook</h2>
<p style="font-size:12px;color:gray;">Developed by Shriganesh Manurkar</p>

<div class="card">
<h3>Add Transaction</h3>

<select id="type">
<option>Expense</option>
<option>Income</option>
</select>

<input type="number" id="amount" placeholder="Amount">

<select id="category">
<option>Grocery</option>
<option>Fuel</option>
<option>Shopping</option>
<option>Salary</option>
<option>Other</option>
</select>

<input type="text" id="note" placeholder="Note">

<input type="file" id="file">

<button onclick="addTransaction()">Save</button>
</div>

<div class="card">
<h3>Summary</h3>
<p id="summary"></p>
</div>

<div class="card">
<h3>Transactions</h3>
<div id="list"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("ledger") || "[]");

function save() {
localStorage.setItem("ledger", JSON.stringify(data));
}

function addTransaction() {
let t = {
type: document.getElementById("type").value,
amount: Number(document.getElementById("amount").value),
category: document.getElementById("category").value,
note: document.getElementById("note").value,
date: new Date().toLocaleDateString()
};

data.unshift(t);
save();
render();
}

function render() {
let income=0, expense=0;

let html="";

data.forEach(d=>{
if(d.type==="Income") income+=d.amount;
else expense+=d.amount;

html += `<div style="border-bottom:1px solid #eee;padding:5px">
<b>${d.category}</b> - ₹${d.amount}<br>
<small>${d.date}</small>
</div>`;
});

document.getElementById("list").innerHTML = html;
document.getElementById("summary").innerText =
"Income: ₹"+income+" | Expense: ₹"+expense+" | Savings: ₹"+(income-expense);
}

render();
</script>

</body>
</html>
