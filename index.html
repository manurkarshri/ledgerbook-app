<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LedgerBook</title>

<style>
body {
  font-family: -apple-system;
  background: black;
  color: white;
  margin: 0;
}

.container {
  padding: 15px;
}

h1 { margin-bottom: 0; }

.subtitle {
  color: gray;
  font-size: 12px;
}

.card {
  background: #1c1c1e;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

.row {
  display: flex;
  justify-content: space-between;
}

.green { color: #34C759; }
.red { color: #FF3B30; }
.blue { color: #0A84FF; }

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #0A84FF;
  color: white;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

.list-item {
  border-bottom: 1px solid #333;
  padding: 10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>LedgerBook</h1>
<div class="subtitle">Developed by Shriganesh Manurkar</div>

<div class="card">
<div class="row">
<div>Income</div>
<div class="green" id="income">₹0</div>
</div>

<div class="row">
<div>Expense</div>
<div class="red" id="expense">₹0</div>
</div>

<div class="row">
<div>Savings</div>
<div class="blue" id="savings">₹0</div>
</div>
</div>

<button onclick="showAdd()">➕ Add Transaction</button>
<button onclick="toggleReport()">📊 Reports</button>

<div id="form" style="display:none">
<div class="card">

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<input id="amount" type="number" placeholder="Amount">

<select id="category">
<option>Grocery</option>
<option>Travel</option>
<option>Shopping</option>
<option>Salary</option>
<option>Other</option>
</select>

<select id="mode">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>

<input id="note" placeholder="Note">

<input id="file" type="file">

<button onclick="add()">Save</button>

</div>
</div>

<div id="list"></div>

<div id="report" style="display:none">
<div class="card">
<h3>Report</h3>
<div id="chart"></div>
<button onclick="exportCSV()">Export CSV</button>
</div>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("ledger") || "[]")

function save() {
localStorage.setItem("ledger", JSON.stringify(data))
}

function showAdd() {
let f = document.getElementById("form")
f.style.display = f.style.display == "none" ? "block" : "none"
}

function add() {
let t = {
type: type.value,
amount: Number(amount.value),
category: category.value,
mode: mode.value,
note: note.value,
date: new Date().toLocaleDateString()
}
data.push(t)
save()
render()
form.style.display = "none"
}

function render() {
let income = 0, expense = 0
let html = ""

data.forEach((t,i)=>{
if(t.type=="income") income+=t.amount
else expense+=t.amount

html += `
<div class="list-item">
<div>${t.category} (${t.mode})</div>
<div>${t.note}</div>
<div>${t.date}</div>
<div class="${t.type=='income'?'green':'red'}">₹${t.amount}</div>
</div>
`
})

document.getElementById("list").innerHTML = html
document.getElementById("income").innerText = "₹"+income
document.getElementById("expense").innerText = "₹"+expense
document.getElementById("savings").innerText = "₹"+(income-expense)
}

function toggleReport() {
let r = document.getElementById("report")
r.style.display = r.style.display == "none" ? "block" : "none"

let income = data.filter(x=>x.type=="income").reduce((a,b)=>a+b.amount,0)
let expense = data.filter(x=>x.type=="expense").reduce((a,b)=>a+b.amount,0)

document.getElementById("chart").innerHTML =
"Income: ₹"+income+"<br>Expense: ₹"+expense
}

function exportCSV() {
let csv = "Type,Amount,Category,Mode,Note,Date\n"
data.forEach(t=>{
csv += `${t.type},${t.amount},${t.category},${t.mode},${t.note},${t.date}\n`
})

let blob = new Blob([csv])
let a = document.createElement("a")
a.href = URL.createObjectURL(blob)
a.download = "ledger.csv"
a.click()
}

render()
</script>

</body>
</html>
